<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" style="display:block;border:none;outline:none;background:transparent;">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a8ef5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d6fd4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d6eaff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGrad)" />

  <!-- Briefcase / luggage icon -->
  <!-- Handle -->
  <path d="M26 22 C26 18 38 18 38 22" stroke="url(#iconGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Body of briefcase -->
  <rect x="17" y="23" width="30" height="22" rx="4" ry="4" fill="url(#iconGrad)" />

  <!-- Center divider line -->
  <line x1="17" y1="34" x2="47" y2="34" stroke="#1a8ef5" stroke-width="2"/>

  <!-- Left clasp notch -->
  <rect x="28" y="31" width="8" height="6" rx="2" ry="2" fill="#1a8ef5" />

  <!-- Wheel left -->
  <circle cx="23" cy="47" r="2.5" fill="#d6eaff" />
  <!-- Wheel right -->
  <circle cx="41" cy="47" r="2.5" fill="#d6eaff" />

  <!-- Trolley handle top bar -->
  <rect x="29" y="13" width="6" height="3" rx="1.5" fill="url(#iconGrad)" opacity="0.85"/>
  <!-- Trolley handle poles -->
  <rect x="29.5" y="13" width="1.5" height="9" rx="0.75" fill="url(#iconGrad)" opacity="0.85"/>
  <rect x="33" y="13" width="1.5" height="9" rx="0.75" fill="url(#iconGrad)" opacity="0.85"/>
</svg>
